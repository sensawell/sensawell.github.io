<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grip Stickers – Coming Soon</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #0d0d0d;
        color: #f0f0f0;
        font-family: 'Segoe UI', system-ui, sans-serif;
        text-align: center;
        padding: 2rem;
      }

      .logo {
        font-size: 2.5rem;
        font-weight: 800;
        letter-spacing: -1px;
        margin-bottom: 0.25rem;
      }

      .logo span {
        color: #ff4d00;
      }

      .tagline {
        font-size: 0.95rem;
        color: #888;
        margin-bottom: 3rem;
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }

      h1 {
        font-size: clamp(2.5rem, 8vw, 5rem);
        font-weight: 900;
        letter-spacing: -2px;
        line-height: 1.05;
        margin-bottom: 1rem;
      }

      h1 span {
        display: block;
        color: #ff4d00;
      }

      p {
        max-width: 480px;
        font-size: 1.05rem;
        color: #aaa;
        line-height: 1.7;
        margin-bottom: 2.5rem;
      }

      .notify-form {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
        justify-content: center;
      }

      .notify-form input[type='email'] {
        padding: 0.75rem 1.25rem;
        border-radius: 9999px;
        border: 1px solid #333;
        background: #1a1a1a;
        color: #f0f0f0;
        font-size: 1rem;
        width: 260px;
        outline: none;
        transition: border-color 0.2s;
      }

      .notify-form input[type='email']:focus {
        border-color: #ff4d00;
      }

      .notify-form button {
        padding: 0.75rem 1.75rem;
        border-radius: 9999px;
        border: none;
        background: #ff4d00;
        color: #fff;
        font-size: 1rem;
        font-weight: 700;
        cursor: pointer;
        transition:
          background 0.2s,
          transform 0.1s;
      }

      .notify-form button:hover {
        background: #e04300;
      }
      .notify-form button:active {
        transform: scale(0.97);
      }

      .thanks {
        display: none;
        color: #ff4d00;
        font-weight: 600;
        margin-top: 1rem;
      }

      footer {
        position: fixed;
        bottom: 1.25rem;
        font-size: 0.78rem;
        color: #444;
      }
    </style>
  </head>
  <body>
    <div class="logo">Grip<span>Stickers</span></div>
    <p class="tagline">by Sensawell</p>

    <h1>
      Something<span>awesome</span>
      is coming.
    </h1>

    <p>
      We're putting the finishing touches on something great. Leave your email
      and be the first to know when we launch.
    </p>

    <form class="notify-form" onsubmit="handleSubmit(event)">
      <input type="email" placeholder="your@email.com" required />
      <button type="submit">Notify me</button>
    </form>
    <p class="thanks" id="thanks">Thanks! We'll be in touch 🤙</p>

    <footer>&copy; 2026 Sensawell · All rights reserved</footer>

    <script>
      function handleSubmit(e) {
        e.preventDefault();
        e.target.style.display = 'none';
        document.getElementById('thanks').style.display = 'block';
      }
    </script>
  </body>
</html>
